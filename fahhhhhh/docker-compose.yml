services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: celery -A core.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

      
  front:
    build:
      context: .
      dockerfile: Dockerfile.front
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api